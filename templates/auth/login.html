{% extends "base.html" %}
{% block auth_content %}
<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Gharpayy CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
    }

    .login-card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 1rem 3rem rgba(0, 0, 0, .2);
    }

    .brand-icon {
      font-size: 2.5rem;
      color: #4e73df;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center">
  <div style="width: 100%; max-width: 420px; padding: 1rem;">
    <div class="card login-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div class="brand-icon"><i class="bi bi-house-heart-fill"></i></div>
          <h3 class="fw-800 mt-2" style="color: #4e73df;">Gharpayy CRM</h3>
          <p class="text-muted small">Sign in to your account</p>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger small">Invalid username or password.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-600 small">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-600 small">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
          </div>
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-primary w-100 fw-700">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-white-50 small mt-3">&copy; 2024 Gharpayy - PG Accommodation Platform</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
{% endblock %}
